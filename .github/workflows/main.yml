# LATEST GITHUB ACTIONS VERSIONS:
# actions/checkout@v6
# actions/download-artifact@v8
# actions/upload-artifact@v6
# actions/github-script@v8
# actions/cache@v5
# softprops/action-gh-release@v2

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-box2d:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build box2d
        uses: ./.github/actions/build-static-lib
        with:
          name: box2d
          repo: https://github.com/erincatto/box2d.git
          tag: v3.1.1
          c3l: box2d.c3l
          cmake_flags: "-DBOX2D_SAMPLES=OFF -DBOX2D_UNIT_TESTS=OFF"
          os: ${{ matrix.os }}

  build-sdl2:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build sdl2
        uses: ./.github/actions/build-static-lib
        with:
          name: sdl2
          repo: https://github.com/libsdl-org/SDL.git
          tag: release-2.32.10
          c3l: sdl2.c3l
          cmake_flags: "-DSDL_STATIC=ON -DSDL_SHARED=OFF -DSDL_TESTS=OFF -DSDL_DISABLE_INSTALL=OFF"
          os: ${{ matrix.os }}
          after_build: |
             # Normalize SDL2-static.lib -> SDL2.lib on Windows
             if [ "${{ runner.os }}" == "Windows" ]; then
               find "upload_stage/" -type f -name "SDL2-static.lib" -execdir mv {} "SDL2.lib" \; || true
             fi

  build-sdl3:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and install sdl3
        uses: ./.github/actions/build-static-lib
        with:
          name: sdl3
          repo: https://github.com/libsdl-org/SDL.git
          tag: release-3.4.2
          c3l: sdl3.c3l
          cmake_flags: "-DSDL_TESTS=OFF -DSDL_DISABLE_INSTALL=OFF"
          os: ${{ matrix.os }}
          after_build: |
             # Normalize SDL3-static.lib -> SDL3.lib on Windows
             if [ "${{ runner.os }}" == "Windows" ]; then
               find "upload_stage/" -type f -name "SDL3-static.lib" -execdir mv {} "SDL3.lib" \; || true
             fi
             cmake --install build_src/c3_build_temp --config Release --prefix "$GITHUB_WORKSPACE/sdl3_install"
      - name: Upload sdl3 Installation Artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdl3-install-${{ matrix.os }}
          path: sdl3_install/

  build-sdl3_image:
    needs: [build-sdl3]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download sdl3 Installation
        uses: actions/download-artifact@v8
        with:
          name: sdl3-install-${{ matrix.os }}
          path: sdl3_install
      - name: Build sdl3_image
        uses: ./.github/actions/build-static-lib
        with:
          name: sdl3_image
          repo: https://github.com/libsdl-org/SDL_image.git
          tag: release-3.4.0
          c3l: sdl3_image.c3l
          cmake_flags: "-DSDLIMAGE_SAMPLES=OFF -DSDLIMAGE_TESTS=OFF -DSDLIMAGE_AVIF=OFF -DSDLIMAGE_VENDORED=ON -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/sdl3_install"
          os: ${{ matrix.os }}
          after_build: |
             # Normalize SDL3_image-static.lib -> SDL3_image.lib on Windows
             if [ "${{ runner.os }}" == "Windows" ]; then
               find "upload_stage/" -type f -name "SDL3_image-static.lib" -execdir mv {} "SDL3_image.lib" \; || true
             fi

  build-sdl3_ttf:
    needs: [build-sdl3]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download sdl3 Installation
        uses: actions/download-artifact@v8
        with:
          name: sdl3-install-${{ matrix.os }}
          path: sdl3_install
      - name: Build sdl3_ttf
        uses: ./.github/actions/build-static-lib
        with:
          name: sdl3_ttf
          repo: https://github.com/libsdl-org/SDL_ttf.git
          tag: release-3.2.2
          c3l: sdl3_ttf.c3l
          cmake_flags: "-DSDLTTF_SAMPLES=OFF -DSDLTTF_VENDORED=ON -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/sdl3_install"
          os: ${{ matrix.os }}
          after_build: |
             # Normalize SDL3_ttf-static.lib -> SDL3_ttf.lib on Windows
             if [ "${{ runner.os }}" == "Windows" ]; then
               find "upload_stage/" -type f -name "SDL3_ttf-static.lib" -execdir mv {} "SDL3_ttf.lib" \; || true
             fi

  build-lz4:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build lz4
        uses: ./.github/actions/build-static-lib
        with:
          name: lz4
          repo: https://github.com/lz4/lz4.git
          tag: v1.10.0
          c3l: lz4.c3l
          cmake_flags: "-DLZ4_BUILD_CLI=OFF -DLZ4_BUILD_LEGACY_LZ4C=OFF"
          src_path: "build/cmake"
          os: ${{ matrix.os }}

  build-tree_sitter:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build tree_sitter
        uses: ./.github/actions/build-static-lib
        with:
          name: tree_sitter
          repo: https://github.com/tree-sitter/tree-sitter.git
          tag: v0.26.7
          c3l: tree_sitter.c3l
          cmake_flags: "-DBUILD_SHARED_LIBS=OFF"
          os: ${{ matrix.os }}

  build-glfw34:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build glfw34
        uses: ./.github/actions/build-static-lib
        with:
          name: glfw34
          repo: https://github.com/glfw/glfw.git
          tag: "3.4"
          c3l: glfw34.c3l
          cmake_flags: "-DGLFW_BUILD_EXAMPLES=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_DOCS=OFF"
          mac_url: "https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.MACOS.zip"
          mac_lib: "glfw-3.4.bin.MACOS/lib-universal/libglfw3.a"
          win_url: "https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.WIN64.zip"
          win_lib: "glfw-3.4.bin.WIN64/lib-vc2022/glfw3.lib"
          os: ${{ matrix.os }}
          after_build: |
             # Normalize libglfw3 -> libglfw for C3
             find "upload_stage/" -type f \( -name "libglfw3.a" -o -name "glfw3.lib" \) | while read f; do
               dir=$(dirname "$f")
               base=$(basename "$f")
               new_base=${base/3/} # removes the '3' from name
               mv "$f" "$dir/$new_base"
             done

  build-ktx:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build ktx
        uses: ./.github/actions/build-static-lib
        with:
          name: ktx
          repo: https://github.com/KhronosGroup/KTX-Software.git
          tag: v4.4.2
          c3l: ktx.c3l
          cmake_flags: "-DKTX_FEATURE_TESTS=OFF"
          os: ${{ matrix.os }}

  build-raylib:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download raylib
        uses: ./.github/actions/build-static-lib
        with:
          name: raylib
          tag: "5.5"
          c3l: raylib.c3l
          linux_url: "https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_linux_amd64.tar.gz"
          linux_lib: "raylib-5.5_linux_amd64/lib/libraylib.a"
          mac_url: "https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_macos.tar.gz"
          mac_lib: "raylib-5.5_macos/lib/libraylib.a"
          win_url: "https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_win64_msvc16.zip"
          win_lib: "raylib-5.5_win64_msvc16/lib/raylib.lib"
          os: ${{ matrix.os }}

  build-raylib5:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download raylib5
        uses: ./.github/actions/build-static-lib
        with:
          name: raylib5
          tag: "5.0"
          c3l: raylib5.c3l
          linux_url: "https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_linux_amd64.tar.gz"
          linux_lib: "raylib-5.0_linux_amd64/lib/libraylib.a"
          mac_url: "https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_macos.tar.gz"
          mac_lib: "raylib-5.0_macos/lib/libraylib.a"
          win_url: "https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_msvc16.zip"
          win_lib: "raylib-5.0_win64_msvc16/lib/raylib.lib"
          os: ${{ matrix.os }}

  build-webgpu:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download webgpu
        uses: ./.github/actions/build-static-lib
        with:
          name: webgpu
          tag: v0.19.1.1
          c3l: webgpu.c3l
          linux_url: "https://github.com/gfx-rs/wgpu-native/releases/download/v0.19.1.1/wgpu-linux-x86_64-release.zip"
          linux_lib: "libwgpu_native.a"
          mac_url: "https://github.com/gfx-rs/wgpu-native/releases/download/v0.19.1.1/wgpu-macos-aarch64-release.zip"
          mac_lib: "libwgpu_native.a"
          win_url: "https://github.com/gfx-rs/wgpu-native/releases/download/v0.19.1.1/wgpu-windows-x86_64-release.zip"
          win_lib: "wgpu_native.lib"
          os: ${{ matrix.os }}

  build-tigr:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libx11-dev

      - name: Build and Package tigr
        shell: bash
        run: |
          set -x
          if [ "${{ runner.os }}" == "Windows" ]; then
            TARGET_DIR="windows-x64"
            LIB_NAME="tigr.lib"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            TARGET_DIR="macos-aarch64"
            LIB_NAME="libtigr.a"
          else
            TARGET_DIR="linux-x64"
            LIB_NAME="libtigr.a"
          fi

          TARGET_BASE="upload_stage/libraries/tigr.c3l"
          mkdir -p "$TARGET_BASE/$TARGET_DIR"

          git clone https://github.com/erkkah/tigr.git -b v3.2.2 build_src
          cd build_src

          gcc -c tigr.c -o tigr.o
          ar rcs "$LIB_NAME" tigr.o
          cp "$LIB_NAME" "../$TARGET_BASE/$TARGET_DIR/"

      - name: Upload tigr Artifact
        uses: actions/upload-artifact@v6
        with:
          name: tigr-statics-${{ matrix.os }}
          path: upload_stage/

  build-raygui:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libx11-dev

      - name: Build and Package raygui
        shell: bash
        run: |
          set -x
          if [ "${{ runner.os }}" == "Windows" ]; then
            TARGET_DIR="windows-x64"
            LIB_NAME="raygui.lib"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            TARGET_DIR="macos-aarch64"
            LIB_NAME="libraygui.a"
          else
            TARGET_DIR="linux-x64"
            LIB_NAME="libraygui.a"
          fi

          TARGET_BASE="upload_stage/libraries/raygui.c3l"
          mkdir -p "$TARGET_BASE/$TARGET_DIR"

          git clone https://github.com/raysan5/raylib.git -b 5.0 build_raylib
          git clone https://github.com/raysan5/raygui.git -b 4.0 build_raygui

          echo '#define RAYGUI_IMPLEMENTATION' > raygui_impl.c
          echo '#include "raylib.h"' >> raygui_impl.c
          echo '#include "raygui.h"' >> raygui_impl.c

          if [ "${{ runner.os }}" == "Windows" ]; then
            # Build with MSVC to match raylib5 binary
            # Use MSYS2_ARG_CONV_EXCL to prevent Git Bash from 'fixing' the / flags
            export MSYS2_ARG_CONV_EXCL="*"
            cl -c -O2 -Ibuild_raylib/src -Ibuild_raygui/src raygui_impl.c
            lib raygui_impl.obj -out:"$LIB_NAME"
          else
            gcc -c -O2 -I"build_raylib/src" -I"build_raygui/src" raygui_impl.c -o raygui_impl.o
            ar rcs "$LIB_NAME" raygui_impl.o
          fi
          cp "$LIB_NAME" "$TARGET_BASE/$TARGET_DIR/"

      - name: Upload raygui Artifact
        uses: actions/upload-artifact@v6
        with:
          name: raygui-statics-${{ matrix.os }}
          path: upload_stage/

  build-tinyfiledialogs:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build and Package tinyfiledialogs
        shell: bash
        run: |
          set -x
          if [ "${{ runner.os }}" == "Windows" ]; then
            TARGET_DIR="windows-x64"
            LIB_NAME="tinyfiledialogs.lib"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            TARGET_DIR="macos-aarch64"
            LIB_NAME="libtinyfiledialogs.a"
          else
            TARGET_DIR="linux-x64"
            LIB_NAME="libtinyfiledialogs.a"
          fi

          TARGET_BASE="upload_stage/libraries/tinyfiledialogs.c3l"
          mkdir -p "$TARGET_BASE/$TARGET_DIR"

          curl -fSL --retry 5 --retry-delay 30 https://sourceforge.net/projects/tinyfiledialogs/files/tinyfiledialogs-current.zip/download -o tinyfd.zip
          unzip -j tinyfd.zip

          if [ "${{ runner.os }}" == "Windows" ]; then
            export MSYS2_ARG_CONV_EXCL="*"
            cl -c -O2 tinyfiledialogs.c
            lib tinyfiledialogs.obj -out:"$LIB_NAME"
          else
            gcc -c -O2 tinyfiledialogs.c -o tinyfiledialogs.o
            ar rcs "$LIB_NAME" tinyfiledialogs.o
          fi
          cp "$LIB_NAME" "$TARGET_BASE/$TARGET_DIR/"

      - name: Upload tinyfiledialogs Artifact
        uses: actions/upload-artifact@v6
        with:
          name: tinyfiledialogs-statics-${{ matrix.os }}
          path: upload_stage/

  build-sqlite3:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build and Package sqlite3
        shell: bash
        run: |
          set -x
          if [ "${{ runner.os }}" == "Windows" ]; then
            TARGET_DIR="windows-x64"
            LIB_NAME="sqlite3.lib"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            TARGET_DIR="macos-aarch64"
            LIB_NAME="libsqlite3.a"
          else
            TARGET_DIR="linux-x64"
            LIB_NAME="libsqlite3.a"
          fi

          TARGET_BASE="upload_stage/libraries/sqlite3.c3l"
          mkdir -p "$TARGET_BASE/$TARGET_DIR"

          curl -fSL --retry 5 --retry-delay 30 https://sqlite.org/2026/sqlite-amalgamation-3510300.zip -o sqlite.zip
          unzip -j sqlite.zip

          if [ "${{ runner.os }}" == "Windows" ]; then
            cl -c -O2 sqlite3.c
            lib sqlite3.obj -out:"$LIB_NAME"
          else
            gcc -c -O3 -fPIC sqlite3.c -o sqlite3.o
            ar rcs "$LIB_NAME" sqlite3.o
          fi
          cp "$LIB_NAME" "$TARGET_BASE/$TARGET_DIR/"

      - name: Upload sqlite3 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: sqlite3-statics-${{ matrix.os }}
          path: upload_stage/

  build-and-release:
    needs: [build-box2d, build-lz4, build-tree_sitter, build-glfw34, build-ktx, build-raylib, build-raylib5, build-sdl2, build-sdl3, build-sdl3_image, build-sdl3_ttf, build-webgpu, build-tigr, build-raygui, build-tinyfiledialogs, build-sqlite3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Merge all compiled static binaries
        uses: actions/download-artifact@v8
        with:
          pattern: "*-statics-*"
          merge-multiple: true
          path: .

      - name: Link glfw to glfw34 binaries
        run: |
          mkdir -p libraries/glfw.c3l
          # Locate the glfw34.c3l directory anywhere and copy its contents
          SRC_DIR=$(find . -name "glfw34.c3l" -type d -print -quit)
          if [ -n "$SRC_DIR" ]; then
            cp -rn "$SRC_DIR/." libraries/glfw.c3l/ || true
          fi

      - name: Install C3 Compiler
        run: |
          curl -L https://github.com/c3lang/c3c/releases/download/latest-prerelease-tag/c3-linux.tar.gz -o c3.tar.gz
          tar -xzf c3.tar.gz
          echo "$(pwd)/c3" >> $GITHUB_PATH

      - name: Install APT Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libpq-dev libmysqlclient-dev libgl1-mesa-dev libglu1-mesa-dev \
            libvulkan-dev libclang-dev clang build-essential pkg-config \
            libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libasound2-dev libpulse-dev libjack-dev libsndio-dev \
            xorg-dev libxkbcommon-x11-dev

      - name: Prepare System Libraries
        run: |
          # System Fixes - Ubuntu
          sudo cp -r /usr/local/lib/x86_64-linux-gnu/* /usr/local/lib/ 2>/dev/null || true
          sudo ln -sf /usr/lib/llvm-18/lib/libclang.so /usr/lib/libclang.so || true
          sudo ldconfig

      - name: Run Tests
        run: c3c test

      - name: Package Libraries
        run: |
          mkdir -p temp
          for lib in $(jq -r '.targets.all_tests.dependencies | .[]' project.json); do
            folder="${lib}.c3l"
            if [ -d "libraries/$folder" ]; then
              cd "libraries/$folder"
              zip -r "../../temp/$folder" * -x "*.DS_Store"
              cd ../..
            else
              echo "Warning: $folder not found"
            fi
          done

      - name: Delete Old Tag
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/latest',
              sha: context.sha
            })

      - name: Create New Tag
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/latest',
              sha: context.sha
            })

      - name: Create or Update Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          draft: false
          prerelease: false
          files: temp/*.c3l
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
